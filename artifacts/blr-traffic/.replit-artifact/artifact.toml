kind = "data-app"
previewPath = "/"
title = "Bangalore Traffic Dashboard"
version = "1.0.0"
id = "artifacts/blr-traffic"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24120

[services.development]
run = "pnpm --filter @workspace/blr-traffic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blr-traffic", "run", "build" ]
publicDir = "artifacts/blr-traffic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24120"
BASE_PATH = "/"
